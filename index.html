<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MetaFit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/logoAcademia.png">
</head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-[768px] bg-gray-800 rounded-2xl shadow-2xl overflow-hidden">
        <!-- Cabeçalho -->
        <div class="bg-gray-600 p-6 text-white flex flex-col items-center">
            <img src="images/logoAcademia.png" alt="logo" width="220px">
            <p class="text-center text-blue-100 mt-1">Digite seu CPF para entrar</p>
        </div>

        <!-- Conteúdo principal -->
        <div class="p-6">
            <!-- Display do CPF -->
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">CPF:</label>
                <div class="relative">
                    <input type="text" id="cpfInput" 
                           class="w-full text-2xl p-4 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-center font-mono tracking-wider bg-gray-50"
                           placeholder="000.000.000-00"
                           maxlength="14"
                           readonly
                           value="">
                    <button id="clearBtn" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Teclado virtual -->
            <div class="grid grid-cols-3 gap-3 mb-6 bg-gray-800 p-4 rounded-lg">
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="1">1</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="2">2</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="3">3</button>
                
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="4">4</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="5">5</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="6">6</button>
                
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="7">7</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="8">8</button>
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="9">9</button>
                
                <button class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-2xl font-semibold text-white" data-key="0">0</button>
                <button id="backspaceBtn" class="keyboard-btn bg-orange-600 hover:bg-orange-700 p-4 rounded-lg text-xl font-semibold text-white col-span-2">
                    ⌫ Apagar
                </button>
            </div>

            <!-- Botão de consulta -->
            <button id="consultBtn" class="w-full bg-orange-500 hover:bg-orange-700 text-white font-bold py-4 px-6 rounded-lg text-xl transition duration-200  disabled:cursor-not-allowed">
                Entrar
            </button>

            <!-- Área de resultado -->
            <div id="resultArea" class="mt-6 p-4 rounded-lg hidden">
                <div id="resultContent" class="text-center"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
